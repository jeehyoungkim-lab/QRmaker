<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학술대회 이름표 인쇄 시스템</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .controls { margin-bottom: 20px; background: white; padding: 20px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 12px; margin: 5px; width: 280px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 10px 5px; font-size: 16px; }
        .btn-print { background: #e83e8c; box-shadow: 0 4px #b82e6a; }
        .btn-print:active { transform: translateY(2px); box-shadow: 0 2px #b82e6a; }
        
        #badge-template { width: 400px; height: 550px; background: white; margin: 20px auto; border: 1px solid #eee; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .header-banner { width: 100%; height: 110px; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        .info-section { margin-top: 60px; }
        .info-section h1 { font-size: 45px; margin: 15px 0; color: #000; font-weight: 800; }
        .info-section p { font-size: 22px; color: #444; margin: 5px 0; }
        #qr-image { margin-top: 40px; width: 160px; height: 160px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body onload="updateBadge()"> <!-- 페이지 로딩 시 초기값 생성 -->

    <h2>학술대회 이름표 즉시 인쇄</h2>
    
    <div class="controls">
        <!-- oninput을 사용해 타이핑 즉시 화면이 바뀌게 설정 -->
        <input type="text" id="userName" placeholder="이름을 입력하세요" oninput="updateBadge()"> <br>
        <input type="text" id="userUniv" placeholder="대학교" oninput="updateBadge()"> <br>
        <input type="text" id="userDept" placeholder="학과" oninput="updateBadge()"> <br>
        <button class="btn-print" onclick="printBadge()">바로 인쇄하기 (PDF 생성)</button>
    </div>

    <div id="badge-template">
        <div class="header-banner">ACADEMIC CONFERENCE 2024</div>
        <div class="info-section">
            <p id="displayUniv">소속 대학교</p>
            <p id="displayDept">소속 학과</p>
            <h1 id="displayName">성함</h1>
        </div>
        <img id="qr-image" src="" alt="QR Code">
    </div>

    <script>
        // 실시간으로 이름표와 QR을 업데이트하는 함수
        function updateBadge() {
            const name = document.getElementById('userName').value || "성함";
            const univ = document.getElementById('userUniv').value || "소속 대학교";
            const dept = document.getElementById('userDept').value || "소속 학과";

            document.getElementById('displayName').innerText = name;
            document.getElementById('displayUniv').innerText = univ;
            document.getElementById('displayDept').innerText = dept;

            // 구글 QR API (값이 없어도 기본 텍스트로 QR 생성)
            const qrContent = name === "성함" ? "Welcome to Conference" : `NAME:${name}, UNIV:${univ}`;
            const qrImg = document.getElementById('qr-image');
            qrImg.src = `https://googleapis.com{encodeURIComponent(qrContent)}&choe=UTF-8`;
        }

        async function printBadge() {
            const badge = document.getElementById('badge-template');
            try {
                const canvas = await html2canvas(badge, {
                    scale: 3,
                    useCORS: true
                });
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(imgData, 'PNG', 55, 30, 100, 137.5);
                
                pdf.autoPrint();
                window.open(pdf.output('bloburl'), '_blank');
            } catch (error) {
                alert("인쇄창을 띄우지 못했습니다. 브라우저 설정에서 팝업을 허용해 주세요!");
            }
        }
    </script>
</body>
</html>
