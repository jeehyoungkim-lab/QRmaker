<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학술대회 이름표 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .no-print { background: white; padding: 20px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 12px; margin: 5px; width: 280px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 15px 30px; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 18px; background: #c2185b; }
        
        #badge-area { 
            width: 10cm; height: 15cm; background: white; margin: 0 auto; 
            border: 1px solid #eee; position: relative; display: flex; flex-direction: column;
        }
        .header { width: 100%; height: 2.5cm; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .content { flex-grow: 1; padding-top: 1.5cm; }
        .content p { font-size: 20px; margin: 5px 0; color: #555; }
        .content h1 { font-size: 40px; margin: 15px 0; color: #000; font-weight: bold; }
        #qrcode { display: flex; justify-content: center; margin-top: 1cm; }
        #qrcode canvas, #qrcode img { border: 1px solid #f0f0f0; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #badge-area { border: none; margin: 0; }
        }
    </style>
</head>
<body onload="updateBadge()">

    <div class="no-print">
        <h2>학술대회 이름표 생성 (오프라인 모드)</h2>
        <input type="text" id="name" placeholder="성함" oninput="updateBadge()"> <br>
        <input type="text" id="univ" placeholder="대학교" oninput="updateBadge()"> <br>
        <input type="text" id="dept" placeholder="학과" oninput="updateBadge()"> <br><br>
        <button onclick="window.print()">이름표 바로 인쇄하기</button>
    </div>

    <div id="badge-area">
        <div class="header">ACADEMIC CONFERENCE 2024</div>
        <div class="content">
            <p id="disp-univ">소속 대학교</p>
            <p id="disp-dept">소속 학과</p>
            <h1 id="disp-name">성함</h1>
            <div id="qrcode"></div>
        </div>
    </div>

    <!-- QR 라이브러리 본체 (수정 금지) -->
    <script>
function updateBadge() {
    // 1. 입력창에서 값을 가져옵니다.
    const nameVal = document.getElementById('name').value || "성함";
    const univVal = document.getElementById('univ').value || "소속 대학교";
    const deptVal = document.getElementById('dept').value || "소속 학과";

    // 2. 화면의 텍스트(id가 disp-로 시작하는 것들)를 즉시 바꿉니다.
    document.getElementById('disp-name').innerText = nameVal;
    document.getElementById('disp-univ').innerText = univVal;
    document.getElementById('disp-dept').innerText = deptVal;

    // 3. QR 코드를 새로 그립니다. (내장된 라이브러리 활용)
    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = ""; // 이전 QR 삭제

    // QRCode 라이브러리가 정상적으로 로드되었다면 실행
    if (typeof QRCode !== "undefined") {
        new QRCode(qrDiv, {
            text: `NAME:${nameVal}, UNIV:${univVal}`,
            width: 150,
            height: 150
        });
    }
}
